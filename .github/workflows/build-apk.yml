name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Setup Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Setup Java ──────────────────────────────────────────────────────────
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── Setup pnpm ──────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ─── Cache pnpm store ────────────────────────────────────────────────────
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ─── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Install EAS CLI ─────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ─── Expo Prebuild ───────────────────────────────────────────────────────
      - name: Run Expo prebuild
        run: npx expo prebuild --clean --platform android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── Build APK locally ───────────────────────────────────────────────────
      - name: Build Android APK (local)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.enableR8.fullMode=false \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ─── Find and rename APK ─────────────────────────────────────────────────
      - name: Find APK
        run: |
          find android -name "*.apk" -type f
          mkdir -p output
          find android -name "*.apk" -exec cp {} output/SalviaX-AI.apk \;

      # ─── Upload APK artifact ─────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalviaX-AI-APK
          path: output/SalviaX-AI.apk
          retention-days: 30

      # ─── Create Release (on tag) ──────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/SalviaX-AI.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
